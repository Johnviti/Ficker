services:
  db:
    image: mysql:5.7
    container_name: ficker-local-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: America/Sao_Paulo
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - dbdata_local:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ficker-local-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      TZ: America/Sao_Paulo
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ficker-local-backend
    restart: unless-stopped
    depends_on:
      - db
    entrypoint: ["/bin/sh", "/app/docker/local/backend-entrypoint.sh"]
    command: ["supervisord"]
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - .:/app
      - backend_vendor_local:/app/vendor
      - backend_storage_local:/app/storage
      - backend_bootstrap_cache_local:/app/bootstrap/cache

volumes:
  dbdata_local:
  backend_vendor_local:
  backend_storage_local:
  backend_bootstrap_cache_local:
